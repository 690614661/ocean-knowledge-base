# Docker 环境覆盖 — 通过环境变量配置连接地址和日志
# 启动方式: java -jar ocean-server.jar --spring.profiles.active=prod
# 或通过 docker-compose 设置对应环境变量
spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:mysql}:3306/ocean_knowledge?useUnicode=true&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
  redis:
    host: ${REDIS_HOST:redis}
  elasticsearch:
    uris: http://${ES_HOST:elasticsearch}:9200
  rocketmq:
    name-server: ${ROCKETMQ_HOST:rocketmq-nameserver}:9876

rocketmq:
  consumer:
    vote:
      enabled: true

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

file:
  upload-path: /app/upload/

