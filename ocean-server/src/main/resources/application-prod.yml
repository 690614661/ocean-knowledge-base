spring:
  datasource:
    url: jdbc:mysql://mysql:3306/ocean_knowledge?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4
    username: root
    password: ${MYSQL_PASSWORD:root123}
  redis:
    host: redis
    port: 6379
  elasticsearch:
    uris: http://elasticsearch:9200
  rocketmq:
    name-server: rocketmq-nameserver:9876

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

jwt:
  secret: ${JWT_SECRET:ocean_knowledge_jwt_secret_2026}
  expiration: 86400000

salt:
  password: ocean_knowledge_salt_2026

ai:
  provider: deepseek
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:}
    base-url: https://api.deepseek.com
    model: deepseek-chat
    max-tokens: 4096
    temperature: 0.7
    timeout: 60

file:
  upload-path: /app/upload/

cors:
  allowed-origins: http://localhost,http://localhost:80,http://localhost:3000
