server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ocean_knowledge?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&connectionCollation=utf8mb4_general_ci
    username: root
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: localhost
    port: 6379
    timeout: 5000ms
  elasticsearch:
    uris: http://localhost:9200
  rocketmq:
    name-server: localhost:9876
    producer:
      group: ocean-producer

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath:mapper/*.xml

jwt:
  secret: ${JWT_SECRET:ocean_knowledge_jwt_secret_2026}
  expiration: 86400000

salt:
  password: ocean_knowledge_salt_2026

ai:
  provider: deepseek
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:}
    base-url: https://api.deepseek.com
    model: deepseek-chat
    max-tokens: 4096
    temperature: 0.7
    timeout: 60

file:
  upload-path: ./upload/
