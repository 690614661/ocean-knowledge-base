version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ocean-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: ocean_knowledge
      MYSQL_CHARSET: utf8mb4
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./ocean-server/src/main/resources/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci --skip-character-set-client-handshake
    networks:
      - ocean-network

  redis:
    image: redis:5-alpine
    container_name: ocean-redis
    ports:
      - "6379:6379"
    networks:
      - ocean-network

  elasticsearch:
    image: elasticsearch:7.17.0
    container_name: ocean-es
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - ocean-network

  rocketmq-nameserver:
    image: apache/rocketmq:5.1.4
    container_name: ocean-rocketmq-nameserver
    command: sh mqnamesrv
    ports:
      - "9876:9876"
    networks:
      - ocean-network

  rocketmq-broker:
    image: apache/rocketmq:5.1.4
    container_name: ocean-rocketmq-broker
    command: sh mqbroker -n rocketmq-nameserver:9876
    depends_on:
      - rocketmq-nameserver
    ports:
      - "10911:10911"
    environment:
      - NAMESRV_ADDR=rocketmq-nameserver:9876
    networks:
      - ocean-network

  ocean-server:
    build:
      context: ./ocean-server
      dockerfile: Dockerfile
    container_name: ocean-server
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis
      - elasticsearch
      - rocketmq-nameserver
      - rocketmq-broker
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - MYSQL_PASSWORD=root123
      - JWT_SECRET=ocean_knowledge_jwt_secret_2026
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
    volumes:
      - upload-data:/app/upload
    networks:
      - ocean-network

  nginx:
    image: nginx:alpine
    container_name: ocean-nginx
    ports:
      - "80:80"
    volumes:
      - ./ocean-web/dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - ocean-server
    networks:
      - ocean-network

volumes:
  mysql-data:
  es-data:
  upload-data:

networks:
  ocean-network:
    driver: bridge
